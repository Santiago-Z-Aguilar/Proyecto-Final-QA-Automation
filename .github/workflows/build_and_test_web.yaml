name: CI Web
run-name: CI Web ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: Web/tests/home/test_home.py
            sanitized: Web-tests-home
          - group: Web/tests/checkout/test_checkout.py
            sanitized: Web-tests-checkout
          - group: Web/tests/search/test_search.py
            sanitized: Web-tests-search
          - group: Web/tests/sign_up/test_signup.py
            sanitized: Web-tests-signup
          - group: Web/tests/test_login.py
            sanitized: Web-tests-login
          - group: Web/tests/product_detail/test_product_detail.py
            sanitized: Web-tests-product_detail
          - group: Web/tests/shopping_cart/test_shopping_cart.py
            sanitized: Web-tests-shopping_cart
          - group: Web/tests/slider_banner/test_slider_banner.py
            sanitized: Web-tests-slider_banner
          - group: Web/tests/e2e/test_e2e.py
            sanitized: Web-tests-e2e
          - group: Web/tests/logo/test_logo.py
            sanitized: Web-tests-logo
          - group: Web/tests/product_list/test_plp.py
            sanitized: Web-tests-plp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest selenium webdriver-manager pytest-html pytest-cov behave pytest-bdd 
          fi

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Ejecutar pruebas con Pytest
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: pytest --html=reports/${{ matrix.group }}.html "${{ matrix.group }}" --self-contained-html

      - name: Subir reportes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.sanitized }}
          path: reports/${{ matrix.group }}.html



  merge-reports-web:
    runs-on: ubuntu-latest
    needs: [ web-tests ]   # waits for all test jobs to finish
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: web-reports

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytest-html-merger
        run: pip install pytest-html-merger

      - name: Check for invalid HTML files
        run: |
          echo "=== Checking HTML files ==="
          for f in $(find web-reports -type f -name "*.html"); do
          if ! grep -q "class=\"summary\"" "$f"; then
            echo "❌ Invalid pytest-html file: $f"
          fi
          done

      - name: Merge reports
        run: pytest_html_merger -i web-reports -o web-final-report.html

      - name: Upload final merged report
        uses: actions/upload-artifact@v4
        with:
          name: web-final-report
          path: web-final-report.html





